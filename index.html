<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHANVEER v11 • Easy Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: #0a0a0a; border-top: 1px solid #333; }
    .main-content { padding-top: 110px; padding-bottom: 90px; overflow-y: auto; height: 100vh; }
    .nav-item { transition: all 0.2s; }
    .nav-item.active { color: #eab308 !important; transform: scale(1.08); }
    .index-bar { background: #111; position: sticky; top: 0; z-index: 40; }
    .toast { position: fixed; bottom: 100px; left: 10px; right: 10px; background: #065f46; color: white; padding: 12px; border-radius: 12px; text-align: center; z-index: 60; opacity: 0; transition: opacity 0.4s; }
  </style>
</head>
<body class="min-h-screen">

  <!-- HEADER -->
  <div class="fixed top-0 left-0 right-0 bg-black border-b border-gray-800 z-50">
    <div class="flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-yellow-500 rounded flex items-center justify-center text-black font-bold text-xl">DV</div>
        <div class="font-bold text-xl">DHANVEER</div>
      </div>
      <div id="market-status" class="px-4 py-1 rounded-full text-sm font-medium bg-green-600 text-black">● OPEN</div>
      <div id="clock" class="text-base font-mono">09:30</div>
    </div>

    <div class="index-bar grid grid-cols-4 text-center text-sm py-2 border-t border-gray-700">
      <div><div class="text-gray-500 text-xs">NIFTY</div><div id="nifty" class="font-bold text-green-400">–</div></div>
      <div><div class="text-gray-500 text-xs">SENSEX</div><div id="sensex" class="font-bold text-green-400">–</div></div>
      <div><div class="text-gray-500 text-xs">BANKNIFTY</div><div id="bank" class="font-bold text-green-400">–</div></div>
      <div><div class="text-gray-500 text-xs">FINNIFTY</div><div id="fin" class="font-bold text-green-400">–</div></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content px-4">

    <!-- HOME -->
    <div id="home" class="tab-content active">
      <div class="bg-gray-900 rounded-xl p-4 mb-5">
        <div class="text-yellow-400 font-medium mb-2">Live Status</div>
        <div id="connection-msg" class="text-sm text-gray-400">Waiting for credentials...</div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-gray-800 rounded-xl p-5 text-center">
          <div class="text-gray-400 text-sm">NIFTY</div>
          <div id="live-nifty" class="text-3xl font-bold text-green-400 mt-1">–</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-5 text-center">
          <div class="text-gray-400 text-sm">SENSEX</div>
          <div id="live-sensex" class="text-3xl font-bold text-green-400 mt-1">–</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-5 text-center">
          <div class="text-gray-400 text-sm">BANK NIFTY</div>
          <div id="live-bank" class="text-3xl font-bold text-green-400 mt-1">–</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-5 text-center">
          <div class="text-gray-400 text-sm">FIN NIFTY</div>
          <div id="live-fin" class="text-3xl font-bold text-green-400 mt-1">–</div>
        </div>
      </div>
    </div>

    <!-- TRIKAL -->
    <div id="trikal" class="tab-content">
      <div class="bg-gray-900 rounded-xl p-6 text-center mt-6">
        <div class="text-4xl mb-4">🏛️</div>
        <div class="text-xl font-bold mb-3">TRIKAL ENGINE</div>
        <div id="trikal-msg" class="text-green-400 text-lg">Connect in SETUP to activate</div>
      </div>
    </div>

    <!-- SETUP -->
    <div id="setup" class="tab-content">
      <div class="bg-gray-900 rounded-xl p-6 mt-6">
        <h2 class="text-yellow-400 text-xl font-bold mb-6">SETUP - Connect Dhan</h2>
        
        <div class="space-y-5">
          <div>
            <label class="text-sm text-gray-400 block mb-1">Client ID</label>
            <input id="client-id" type="text" class="w-full bg-black border border-gray-700 rounded-lg px-4 py-3 text-base" placeholder="Your Dhan Client ID">
          </div>
          <div>
            <label class="text-sm text-gray-400 block mb-1">Access Token</label>
            <input id="access-token" type="password" class="w-full bg-black border border-gray-700 rounded-lg px-4 py-3 text-base" placeholder="Your Access Token">
          </div>
          <div>
            <label class="text-sm text-gray-400 block mb-1">Worker URL</label>
            <input id="worker-url" type="text" class="w-full bg-black border border-gray-700 rounded-lg px-4 py-3 text-base" placeholder="https://your-worker.workers.dev">
          </div>

          <button onclick="saveAndConnect()" class="w-full bg-green-600 text-white font-bold py-4 rounded-lg text-lg mt-4">
            SAVE & CONNECT
          </button>
        </div>

        <div id="setup-result" class="mt-6 text-center text-base"></div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav py-3">
    <div class="flex justify-around text-xs">
      <div id="nav-home" onclick="switchTab('home')" class="nav-item flex flex-col items-center cursor-pointer text-yellow-400">
        <div class="text-3xl mb-1">🏠</div>
        <div>HOME</div>
      </div>
      <div id="nav-trikal" onclick="switchTab('trikal')" class="nav-item flex flex-col items-center cursor-pointer">
        <div class="text-3xl mb-1">🏛️</div>
        <div>TRIKAL</div>
      </div>
      <div id="nav-setup" onclick="switchTab('setup')" class="nav-item flex flex-col items-center cursor-pointer">
        <div class="text-3xl mb-1">⚙️</div>
        <div>SETUP</div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script>
    let connected = false;

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');

      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('text-yellow-400'));
      document.getElementById('nav-' + tab).classList.add('text-yellow-400');
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${isError ? 'bg-red-800' : 'bg-green-800'} text-white`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 4000);
    }

    async function fetchLiveData() {
      const worker = localStorage.getItem('workerUrl');
      if (!worker) return;

      try {
        const response = await fetch(worker, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'access-token': localStorage.getItem('dhanToken'),
            'client-id': localStorage.getItem('dhanClientId')
          },
          body: JSON.stringify({
            RequestCode: 15,
            InstrumentCount: 4,
            InstrumentList: [
              {ExchangeSegment: "IDX_I", SecurityId: "13"},   // NIFTY
              {ExchangeSegment: "IDX_I", SecurityId: "4"},    // SENSEX (BSE)
              {ExchangeSegment: "IDX_I", SecurityId: "25"},   // BANKNIFTY
              {ExchangeSegment: "IDX_I", SecurityId: "27"}    // FINNIFTY
            ]
          })
        });

        if (!response.ok) throw new Error('Network error');

        const data = await response.json();

        // Update prices (adjust keys based on your worker response format)
        document.getElementById('nifty').textContent = data.nifty?.LTP?.toLocaleString() || '–';
        document.getElementById('sensex').textContent = data.sensex?.LTP?.toLocaleString() || '–';
        document.getElementById('bank').textContent = data.banknifty?.LTP?.toLocaleString() || '–';
        document.getElementById('fin').textContent = data.finnifty?.LTP?.toLocaleString() || '–';

        document.getElementById('live-nifty').textContent = data.nifty?.LTP?.toLocaleString() || '–';
        document.getElementById('live-sensex').textContent = data.sensex?.LTP?.toLocaleString() || '–';
        document.getElementById('live-bank').textContent = data.banknifty?.LTP?.toLocaleString() || '–';
        document.getElementById('live-fin').textContent = data.finnifty?.LTP?.toLocaleString() || '–';

        connected = true;
        document.getElementById('connection-msg').textContent = 'Connected to Dhan Live ✓';
        document.getElementById('trikal-msg').textContent = 'TRIKAL ready with live data';
      } catch (err) {
        console.log(err);
        showToast('Check Worker URL or Token', true);
      }
    }

    function saveAndConnect() {
      const client = document.getElementById('client-id').value.trim();
      const token = document.getElementById('access-token').value.trim();
      const worker = document.getElementById('worker-url').value.trim();

      if (!client || !token || !worker) {
        showToast('Enter all 3 fields', true);
        return;
      }

      localStorage.setItem('dhanClientId', client);
      localStorage.setItem('dhanToken', token);
      localStorage.setItem('workerUrl', worker);

      showToast('Credentials saved! Connecting...');
      document.getElementById('setup-result').innerHTML = '<span class="text-green-400">Saved ✓ Now getting live prices</span>';

      fetchLiveData();
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN', {hour: '2-digit', minute: '2-digit'});
    }

    // Init
    switchTab('home');
    updateClock();
    setInterval(updateClock, 30000);

    // Auto try connect if already saved
    if (localStorage.getItem('workerUrl')) {
      fetchLiveData();
    }

    // Poll every 10 seconds if connected
    setInterval(() => {
      if (connected) fetchLiveData();
    }, 10000);
  </script>
</body>
</html>
